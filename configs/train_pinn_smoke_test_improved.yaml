# Fast smoke test config (~10 minutes)
# Validates architecture and training pipeline

seed: 42
device: "cpu"

model:
  hidden: 256
  layers: 6
  learn_eta: false
  eta_scalar: 0.01
  fourier:
    max_log2_freq: 4
    ramp_frac: 0.5

classifier:
  hidden: 128
  dropout: 0.1
  horizons: [6, 12, 24]
  loss_type: "focal"
  focal_alpha: 0.25
  focal_gamma: 3.0
  pos_weight: null

physics:
  enable: false  # P0 only for smoke test
  resistive: false
  boundary_terms: false
  lambda_phys_schedule:
    - [0.0, 0.0]
    - [1.0, 0.0]

eta:
  min: 1.0e-4
  max: 1.0
  tv_weight: 1.0e-3

loss_weights:
  cls: 1.0
  data: 1.0
  curl_consistency: 0.0

collocation:
  n_max: 8192
  alpha_start: 0.5
  alpha_end: 0.8
  impw_clip_quantile: 0.99

train:
  steps: 500
  batch_size: 2
  lr: 1.0e-3
  grad_clip: 1.0
  amp: false
  log_every: 20
  eval_every: 100
  checkpoint_every: 1000
  checkpoint_dir: null

data:
  use_real: false
  windows_parquet: null
  frames_meta_parquet: null
  npz_root: null
  target_size: 128
  input_hours: 24
  P_per_t: 512
  pil_top_pct: 0.15
  dummy_T: 6
  dummy_H: 48
  dummy_W: 48
  dummy_num_samples: 256



