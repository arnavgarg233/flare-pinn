# Production config for REAL SHARP data training
# Ready to train with 488,150 frames on S: drive

seed: 42
device: "cuda"  # Change to "cpu" if no GPU

model:
  hidden: 384
  layers: 10
  learn_eta: false        # Start false; set true later for P4s (learned resistivity)
  eta_scalar: 0.01
  fourier:
    max_log2_freq: 5
    ramp_frac: 0.5        # Frequency annealing: ramp from 0-50% of training

classifier:
  hidden: 256
  dropout: 0.1
  horizons: [6, 12, 24]    # Predict 6h, 12h, 24h ahead
  loss_type: "focal"       # "focal" handles class imbalance better than "bce"
  focal_alpha: 0.25        # Weight for positive class (M/X flares)
  focal_gamma: 2.0         # Focusing parameter (higher = more focus on hard examples)
  pos_weight: null         # Auto-computed from data

physics:
  enable: true             # Set false for P0 (data-only), true for P1+ (physics-informed)
  resistive: false         # Set true for P3+ (resistive MHD)
  boundary_terms: false
  lambda_phys_schedule:
    - [0.0, 0.0]           # P0: Data-driven warmup
    - [0.3, 0.0]           # Start physics at 30% progress
    - [0.8, 2.0]           # Strong physics by 80%
    - [1.0, 3.0]           # Full strength at completion

eta:
  min: 1.0e-4
  max: 1.0
  tv_weight: 1.0e-3        # Total variation regularization on resistivity

loss_weights:
  cls: 1.0                 # Classification loss weight
  data: 1.0                # Data fitting (B_z) loss weight
  curl_consistency: 0.0    # Optional: curl(A_z) consistency

collocation:
  n_max: 20000             # Max collocation points per batch
  alpha_start: 0.5         # Initial PIL (polarity inversion line) bias
  alpha_end: 0.8           # Final PIL bias (increases over training)
  impw_clip_quantile: 0.99 # Importance weight clipping

train:
  steps: 5000              # Total training steps (increase to 10k-20k for production)
  batch_size: 1            # PINN typically uses batch_size=1
  lr: 1.0e-3               # Learning rate
  grad_clip: 1.0           # Gradient clipping (stability)
  amp: true                # Automatic mixed precision (faster on GPU)
  log_every: 25            # Log metrics every N steps
  eval_every: 200          # Evaluate on recent buffer every N steps
  checkpoint_every: 500    # Save checkpoint every N steps
  checkpoint_dir: "checkpoints/real_production"

data:
  use_real: true           # ✓ ENABLE REAL SHARP DATA
  
  # Real data paths (all verified accessible)
  windows_parquet: "data/interim/windows_train.parquet"
  frames_meta_parquet: "S:/flare_forecasting/frames_meta.parquet"
  npz_root: "S:/flare_forecasting"
  
  # Data processing settings
  target_size: 256         # Resize all frames to 256x256
  input_hours: 48          # Use 48 hours of history (49 frames at 1h cadence)
  P_per_t: 1024            # Collocation points per time step
  pil_top_pct: 0.15        # Top 15% gradient magnitude for PIL mask
  
  # Dummy data settings (ignored when use_real=true)
  dummy_T: 8
  dummy_H: 64
  dummy_W: 64
  dummy_num_samples: 2048

