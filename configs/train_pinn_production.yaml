# Full production config with real SHARP data
# Requires: processed SHARP NPZ, windows parquet, frames metadata
# Estimated training time: 12-24 hours on V100/A100

seed: 42
device: "cuda"

model:
  hidden: 512
  layers: 12
  learn_eta: true  # Learn spatially-varying resistivity
  eta_scalar: 0.01
  fourier:
    max_log2_freq: 6
    ramp_frac: 0.4

classifier:
  hidden: 384
  dropout: 0.15
  horizons: [6, 12, 24, 48]  # Extended horizons
  loss_type: "focal"
  focal_alpha: 0.25
  focal_gamma: 2.5
  pos_weight: null  # Will be computed from data

physics:
  enable: true
  resistive: true  # Include diffusion term
  boundary_terms: false
  lambda_phys_schedule:
    - [0.0, 0.0]    # P0: Pure data-driven (0-20%)
    - [0.2, 0.0]
    - [0.4, 0.5]    # P1: Weak physics
    - [0.6, 1.5]    # P2: Moderate physics
    - [0.8, 3.0]    # P3: Strong physics
    - [1.0, 5.0]    # P4: Full physics

eta:
  min: 1.0e-5
  max: 2.0
  tv_weight: 5.0e-4

loss_weights:
  cls: 1.0
  data: 0.5  # Reduce data weight as physics increases
  curl_consistency: 0.1

collocation:
  n_max: 32768
  alpha_start: 0.6
  alpha_end: 0.9
  impw_clip_quantile: 0.995

train:
  steps: 50000
  batch_size: 1
  lr: 5.0e-4
  grad_clip: 1.0
  amp: true
  log_every: 50
  eval_every: 500
  checkpoint_every: 1000
  checkpoint_dir: "checkpoints/production"

data:
  use_real: true
  
  # UPDATE THESE PATHS TO YOUR DATA
  windows_parquet: "data/interim/windows_train.parquet"
  frames_meta_parquet: "data/interim/frames/frames_meta.parquet"
  npz_root: "data/processed/SHARP_1h"
  
  target_size: 512
  input_hours: 72
  P_per_t: 2048
  pil_top_pct: 0.12
  
  # Dummy settings (not used)
  dummy_T: 8
  dummy_H: 64
  dummy_W: 64
  dummy_num_samples: 2048



