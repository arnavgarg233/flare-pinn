model:
  model_type: hybrid
  hidden: 384
  layers: 10
  learn_eta: false
  in_channels: 3  # Enabled vector inputs
  fourier:
    max_log2_freq: 5
    ramp_frac: 0.5

classifier:
  hidden: 256
  dropout: 0.15
  horizons: [6, 12, 24]
  loss_type: focal
  focal_alpha: 0.25
  focal_gamma: 2.0
  use_attention: true
  use_physics_features: true
  use_rf_guidance: true
  label_smoothing: 0.05
  confidence_penalty: 0.05

physics:
  enable: true
  resistive: true  # Resistive terms enabled
  boundary_terms: false
  lambda_phys_schedule: [[0.0, 0.0], [0.3, 0.0], [0.7, 1.0], [1.0, 2.0]]

loss_weights:
  cls: 1.0
  data: 1.0
  curl_consistency: 0.5  # Strong curl enforcement

collocation:
  n_max: 20000
  alpha_start: 0.5
  alpha_end: 0.9
  impw_clip_quantile: 0.99

train:
  steps: 60000
  batch_size: 8  # Larger batch size possible with 128px
  lr: 1.0e-3
  grad_clip: 1.0
  amp: true
  log_every: 25
  eval_every: 500
  checkpoint_every: 5000
  checkpoint_dir: "outputs/checkpoints/vector_sota_128"
  use_ema: true
  ema_decay: 0.999
  scheduler:
    type: cosine
    warmup_steps: 2000
    min_lr: 1.0e-6
  sampler:
    strategy: class_balanced
    positive_multiplier: 10.0

data:
  use_real: true
  use_consolidated: true
  consolidated_dir: "~/flare_data/consolidated"
  windows_parquet: "~/flare_data/windows_train.parquet"
  target_size: 128
  input_hours: 48
  P_per_t: 1024
  pil_top_pct: 0.15
  val_fraction: 0.15
  scalar_features: ["r_value", "gwpil", "obs_coverage", "frame_count"]

