# MPS-Optimized PINN Config for Apple Silicon 16GB
# Target: Beat SOTA TSS > 0.85 while fitting in 16GB unified memory
#
# SOTA Improvements Enabled:
# - Asymmetric focal loss for imbalanced data
# - Label smoothing for better calibration
# - Aggressive positive oversampling (150x)
# - Aggressive physics curriculum
# - Confidence penalty for calibration
# - RF guidance with domain-knowledge weights

seed: 42
device: "mps"

model:
  model_type: "hybrid"     # CNN encoder + coordinate MLP
  hidden: 256              # Reduced for 16GB MPS
  layers: 6                # Reduced for 16GB MPS
  learn_eta: true          # Learn spatially-varying resistivity
  eta_scalar: 0.01
  fourier:
    max_log2_freq: 5       # Reduced for memory
    ramp_frac: 0.15        # Faster Fourier feature ramp-up

classifier:
  hidden: 128              # Reduced for memory
  dropout: 0.25            # Slightly less dropout for better learning
  horizons: [6, 12, 24]
  
  # SOTA: Asymmetric Focal Loss - better for imbalanced data
  loss_type: "asymmetric"
  focal_alpha: 0.75        # Weight for positive class
  focal_gamma: 2.0         # Focusing for positives (lower = less focusing)
  asymmetric_gamma_neg: 4.0  # Strong focusing on hard negatives
  
  # SOTA: Label smoothing for better calibration
  label_smoothing: 0.05
  
  # SOTA: Confidence penalty prevents overconfident predictions
  confidence_penalty: 0.02
  
  # Enable all advanced features
  use_rf_guidance: true    # Domain-knowledge feature weighting
  use_attention: true      # Spatial + temporal attention
  use_physics_features: true  # Physics-derived features
  
  pos_weight: null         # Not used with asymmetric focal

physics:
  enable: true
  resistive: true
  boundary_terms: false
  
  # FIXED: Physics starts at ZERO to prevent NaN!
  # Gradual introduction for stability
  lambda_phys_schedule:
    - [0.0, 0.0]           # NO physics at start (prevents NaN!)
    - [0.15, 0.0]          # Still zero during warm-up
    - [0.25, 0.5]          # Start introducing physics
    - [0.4, 1.5]           # Moderate physics
    - [0.6, 3.0]           # Stronger
    - [0.8, 5.0]           # Strong
    - [1.0, 8.0]           # Maximum (reasonable limit)

eta:
  min: 1.0e-5
  max: 2.0
  tv_weight: 1.0e-3        # Slightly stronger TV regularization

loss_weights:
  cls: 2.5                 # Classification weight (slightly reduced to balance physics)
  data: 1.0                # Data fitting weight
  curl_consistency: 0.1    # Increased curl consistency

collocation:
  n_max: 8192              # Reduced for 16GB MPS
  alpha_start: 0.7         # More PIL focus from start
  alpha_end: 0.95          # Strong PIL focus at end
  impw_clip_quantile: 0.995

train:
  steps: 20000
  batch_size: 1            # Must be 1 for PINN
  lr: 2.5e-4               # Slightly lower LR for stability
  grad_clip: 3.0           # FIXED: Higher clipping (was 0.5, too aggressive)
  amp: false               # CRITICAL: Disable for MPS
  log_every: 10
  eval_every: 2000
  checkpoint_every: 5000
  checkpoint_dir: "outputs/checkpoints/mps_optimized"
  
  scheduler:
    type: "cosine"
    warmup_steps: 3000     # Longer warmup for stability
    min_lr: 1.0e-6
  
  num_workers: 4           # Parallel data loading to avoid I/O bottleneck
  
  sampler:
    strategy: "class_balanced"
    positive_multiplier: 30.0    # FIXED: More moderate (was 150, too aggressive)
    smoothing: 0.4               # More smoothing on weights
  
  use_ema: true
  ema_decay: 0.9995             # Strong EMA for better generalization

data:
  use_real: true
  windows_parquet: "data/interim/windows_train.parquet"
  frames_meta_parquet: "/Volumes/Lexar/flare_forecasting/frames_meta.parquet"
  npz_root: "/Volumes/Lexar/flare_forecasting/frames"
  target_size: 96          # Reduced for 16GB MPS
  input_hours: 48
  P_per_t: 1024            # Reduced for 16GB MPS
  pil_top_pct: 0.10        # Slightly tighter PIL threshold
  val_fraction: 0.12
  
  scalar_features:
    - frame_count_in_window
    - obs_coverage
    - horizon_coverage_6h
    - horizon_coverage_12h
    - horizon_coverage_24h

  dummy_T: 8
  dummy_H: 64
  dummy_W: 64
  dummy_num_samples: 2048
