# =============================================================================
# BASELINE SOTA CONFIG - Phase 1: Classification-Only
# =============================================================================
# Goal: Get TSS > 0.50 WITHOUT physics to establish working classifier
# THEN proceed to physics-enhanced training (sota_v2.yaml)
#
# Key Changes from Previous Configs:
# 1. Physics DISABLED - focus on classification first
# 2. Standard focal loss (not asymmetric - simpler and more stable)
# 3. Moderate oversampling (20x, not 150x)
# 4. Higher learning rate for faster iteration
# 5. Data augmentation enabled
# =============================================================================

seed: 42
device: "mps"  # Change to "cuda" for NVIDIA GPUs

model:
  model_type: "hybrid"     # CNN encoder + coordinate MLP
  hidden: 256              # Moderate size for stability
  layers: 6                # Fewer layers for faster training
  learn_eta: false         # DISABLED - no resistivity learning in baseline
  eta_scalar: 0.01
  fourier:
    max_log2_freq: 4       # Lower frequency for stability
    ramp_frac: 0.3         # Moderate ramp

classifier:
  hidden: 128              # Moderate classifier
  dropout: 0.3             # Good dropout for regularization
  horizons: [6, 12, 24]    # Standard prediction horizons
  
  # Simple BCE with pos_weight - most stable for starting
  loss_type: "bce"
  focal_alpha: 0.85        # Not used with BCE but kept for reference
  focal_gamma: 2.0         # Not used with BCE
  pos_weight: 10.0         # Weight positive class (flares are ~7% of data)
  
  # NO label smoothing in baseline (simpler)
  label_smoothing: 0.0
  
  # NO confidence penalty in baseline
  confidence_penalty: 0.0
  
  # Enable attention and physics features (they help even without physics loss)
  use_attention: true
  use_physics_features: true
  use_rf_guidance: false   # Disabled for baseline

# ====== PHYSICS DISABLED FOR BASELINE ======
physics:
  enable: false            # CRITICAL: No physics in baseline phase!
  resistive: false
  boundary_terms: false
  lambda_phys_schedule:
    - [0.0, 0.0]
    - [1.0, 0.0]

eta:
  min: 1.0e-4
  max: 1.0
  tv_weight: 0.0           # No TV regularization

loss_weights:
  cls: 1.0                 # Classification only
  data: 1.0                # Data fitting
  curl_consistency: 0.0    # No curl consistency

collocation:
  n_max: 8192
  alpha_start: 0.5
  alpha_end: 0.8
  impw_clip_quantile: 0.99

train:
  steps: 15000             # Shorter training for baseline
  batch_size: 1            # Single sample per step
  lr: 5.0e-4               # Moderate LR for stability
  grad_clip: 1.0           # Tighter gradient clipping for stability
  amp: false               # Disable AMP for MPS compatibility
  log_every: 5
  eval_every: 500
  checkpoint_every: 2500
  checkpoint_dir: "outputs/checkpoints/baseline_sota"
  
  scheduler:
    type: "cosine"
    warmup_steps: 1000     # Short warmup
    min_lr: 1.0e-5
  
  num_workers: 4           # Parallel data loading to avoid I/O bottleneck
  
  sampler:
    strategy: "class_balanced"
    positive_multiplier: 20.0  # Moderate oversampling
    smoothing: 0.5
  
  use_ema: true
  ema_decay: 0.999         # Standard EMA

data:
  use_real: true
  windows_parquet: "data/interim/windows_train.parquet"
  frames_meta_parquet: "/Volumes/Lexar/flare_forecasting/frames_meta.parquet"
  npz_root: "/Volumes/Lexar/flare_forecasting/frames"
  target_size: 64          # Small for fast iteration
  input_hours: 48          # Match windows_train.parquet (input_span_hours=48)
  P_per_t: 512             # Fewer points for speed
  pil_top_pct: 0.15
  val_fraction: 0.15
  
  scalar_features: []      # No extra scalars in baseline

  dummy_T: 8
  dummy_H: 64
  dummy_W: 64
  dummy_num_samples: 2048

