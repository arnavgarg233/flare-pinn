# =============================================================================
# SOTA CONSOLIDATED CONFIG - Maximum Speed + Best Performance
# =============================================================================
# Use this config AFTER running consolidate_frames.py!
#
# Key Features:
# 1. Uses consolidated dataset (10-50x faster I/O)
# 2. Optimized physics schedule for stability
# 3. All SOTA features enabled
# 4. Calibrated hyperparameters for flare prediction
#
# Expected Performance: TSS > 0.70 at 24h horizon
# Expected Speed: 3-5x faster than individual NPZ loading
# =============================================================================

seed: 42
device: "mps"  # Change to "cuda" for NVIDIA GPUs

model:
  model_type: "hybrid"
  hidden: 384              # Good capacity without overfitting
  layers: 8                # 8 layers is sweet spot for depth vs. gradient flow
  learn_eta: true          # Learn spatially-varying resistivity
  eta_scalar: 0.01
  fourier:
    max_log2_freq: 5       # Captures PIL detail without overfitting
    ramp_frac: 0.25        # Gradual frequency ramp-up

classifier:
  hidden: 256              # Large enough for complex features
  dropout: 0.3             # Strong dropout for generalization
  horizons: [6, 12, 24]
  
  # SOTA: Asymmetric focal loss (best for severe imbalance)
  loss_type: "asymmetric"
  focal_alpha: 0.75
  focal_gamma: 1.5
  asymmetric_gamma_neg: 4.0
  
  # Calibration improvements
  label_smoothing: 0.05
  confidence_penalty: 0.02
  
  # All SOTA features
  use_attention: true
  use_physics_features: true
  use_rf_guidance: true
  
  pos_weight: null

physics:
  enable: true
  resistive: true
  boundary_terms: false
  
  # CRITICAL: Very gradual physics ramp to prevent NaN
  lambda_phys_schedule:
    - [0.0, 0.0]           # No physics at start
    - [0.2, 0.0]           # Classifier warm-up
    - [0.3, 0.3]           # Very gentle start
    - [0.5, 1.0]           # Moderate
    - [0.7, 2.0]           # Stronger
    - [0.9, 4.0]           # Strong
    - [1.0, 5.0]           # Maximum (safe)

eta:
  min: 1.0e-5
  max: 2.0
  tv_weight: 1.0e-3

loss_weights:
  cls: 2.5                 # Prioritize classification
  data: 1.0
  curl_consistency: 0.05

collocation:
  n_max: 16384             # High resolution for physics
  alpha_start: 0.5
  alpha_end: 0.85          # Strong PIL focus at end
  impw_clip_quantile: 0.995

train:
  steps: 35000             # Good balance of training time
  batch_size: 1            # Memory constraint for PINN
  lr: 3.0e-4               # Moderate LR for stability
  grad_clip: 2.0           # Tighter clipping for physics
  amp: false               # MPS doesn't support AMP well
  log_every: 50
  eval_every: 750          # More frequent validation
  checkpoint_every: 5000
  checkpoint_dir: "outputs/checkpoints/sota_consolidated"
  
  scheduler:
    type: "cosine"
    warmup_steps: 2000
    min_lr: 1.0e-6
  
  # IMPORTANT: Set num_workers=0 for MPS! (multiprocessing issues)
  # Set to 4-8 for CUDA
  num_workers: 0
  
  sampler:
    strategy: "class_balanced"
    positive_multiplier: 40.0  # Moderate oversampling
    smoothing: 0.4
  
  use_ema: true
  ema_decay: 0.9995

data:
  use_real: true
  use_consolidated: true   # <<< KEY: Enable consolidated dataset!
  consolidated_dir: "~/flare_data/consolidated"  # <<< UPDATE THIS PATH
  windows_parquet: "data/interim/windows_train.parquet"
  
  # These are ignored when use_consolidated=true:
  frames_meta_parquet: null
  npz_root: null
  
  target_size: 256         # Matches consolidation target_size (256x256)
  input_hours: 48
  P_per_t: 512             # Reduced for 256x256 memory (was 1024 for 64x64)
  pil_top_pct: 0.12
  val_fraction: 0.12
  
  # Scalar features computed per-window and passed to classifier
  # These are automatically computed in the dataset and added to classifier
  scalar_features:
    - r_value              # Schrijver's R-value: log10(∫_PIL |Bz| ds) - key flare predictor
    - gwpil                # Gradient-weighted PIL length - high gradient PILs are dangerous
    - obs_coverage         # Fraction of time steps with valid observations
    - frame_count_in_window # Total number of valid frames

  # Dummy fallback (ignored when use_real=true)
  dummy_T: 8
  dummy_H: 64
  dummy_W: 64
  dummy_num_samples: 2048

